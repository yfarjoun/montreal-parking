[workspace]
authors = ["Yossi Farjoun <yossi@fulcrumgenomics.com>"]
channels = ["conda-forge"]
name = "montreal_parking"
platforms = ["osx-arm64"]
version = "0.1.0"

[dependencies]
pandas = ">=3.0.1,<4"
geopandas = ">=1.1.3,<2"
shapely = ">=2.1.2,<3"
folium = ">=0.20.0,<0.21"
requests = ">=2.32.5,<3"

[feature.dev.dependencies]
pytest = ">=8,<9"
ruff = ">=0.9,<1"
mypy = ">=1.15,<2"
pandas-stubs = ">=2,<3"
types-requests = ">=2.32.4.20260107,<3"

[feature.dev.tasks]
test = "pytest tests/"
lint = "ruff check ."
format = "ruff format ."
typecheck = "mypy main.py montreal_parking/"

[environments]
dev = ["dev"]
