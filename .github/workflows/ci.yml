name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: dev

      - name: Lint
        run: pixi run -e dev lint

      - name: Type check
        run: pixi run -e dev typecheck

      - name: Test
        run: pixi run -e dev test
